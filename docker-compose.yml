services:
  backend:
    build:
      context: ./razorpay-webhook-server
      dockerfile: Dockerfile.backend
    container_name: ajashia-backend
    ports:
      - "4000:4000"
    env_file:
      - ./razorpay-webhook-server/.env
    volumes:
      - ./razorpay-webhook-server/invoices:/app/invoices
      - ./razorpay-webhook-server/assets:/app/assets
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: ajashia-frontend
    volumes:
      - ./dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped